services:
    postgres:
        image: postgres:16-alpine
        container_name: sushi-rolly-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: sushi
            POSTGRES_PASSWORD: sushi
            POSTGRES_DB: sushi_rolly
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U sushi -d sushi_rolly']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
